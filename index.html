<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔥 SYSTEM LOCKED 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: black;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* Video Container Full Screen */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: black;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Fake Overlay Buttons (Do Nothing) */
        .fake-ui {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10000;
            pointer-events: none;
        }

        .fake-ui button {
            background: rgba(255,0,0,0.5);
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 10px;
            font-size: 14px;
            pointer-events: auto;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Buttons actually do nothing until video ends */
        .fake-ui button:active {
            transform: scale(0.95);
        }

        /* Hidden message */
        .hidden-msg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: lime;
            font-family: monospace;
            font-size: 20px;
            text-align: center;
            z-index: 10001;
            display: none;
            background: black;
            padding: 20px;
            border: 2px solid red;
            white-space: nowrap;
        }

        /* Mobile touch disable */
        .disable-touch {
            touch-action: none;
        }
    </style>
</head>
<body class="disable-touch">

<div class="video-container" id="videoContainer">
    <video id="prankVideo" autoplay playsinline>
        <!-- 🔽 YAHAN APNI VIDEO KA DIRECT .mp4 LINK DALO 🔽 -->
        <source src="YOUR_VIDEO_DIRECT_LINK_HERE.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</div>

<div class="fake-ui">
    <button id="fakeCloseBtn">❌ CLICK TO EXIT (FAKE)</button>
    <button id="fakePauseBtn">⏸️ PAUSE (FAKE)</button>
    <button id="fakeMuteBtn">🔇 MUTE (FAKE)</button>
</div>

<div id="hiddenMsg" class="hidden-msg">
    😈 HAA BHAI DAR GAYA NA? 😈<br>
    <span style="font-size: 12px;">🔄 Reload karne ke liye kuch nahi ho sakta... 5 sec mein open hoga</span>
</div>

<script>
    // ⚠️ VIDEO DIRECT LINK YAHAN DALO (Pinterest se .mp4 link chahiye)
    // Temporary solution: User ko prompt karega link dene ke liye
    // Nahi toh apna .mp4 link daalo niche
    
    const video = document.getElementById('prankVideo');
    const container = document.getElementById('videoContainer');
    const fakeBtns = document.querySelectorAll('.fake-ui button');
    let videoEnded = false;
    
    // 🔽🔽🔽🔽🔽🔽🔽🔽🔽🔽🔽🔽🔽🔽🔽🔽🔽🔽
    // YAHAN APNA DIRECT VIDEO LINK LIKHO
    // Example: "https://example.com/video.mp4"
    let userVideoLink = "";  // <-- Yahan paste karo link
    
    // Agar link nahi diya toh user se maang lo
    if(userVideoLink === "") {
        userVideoLink = prompt("🔥 APNA DIRECT VIDEO LINK DAALO (.mp4):\n\nPinterest se link kaise nikale? Chrome extension 'Video Downloader Plus' use karo ya 'Inspect Element' > Network > Media tab.");
        if(!userVideoLink || userVideoLink === "") {
            userVideoLink = "https://sample-videos.com/video123/mp4/720/big_buck_bunny_720p_1mb.mp4"; // fallback
        }
    }
    
    // Apply video source
    video.src = userVideoLink;
    video.load();
    
    // 🔒 DISABLE ALL KEYS (Escape, F5, Ctrl+R, Ctrl+W, Alt+F4, Back, etc.)
    function disableAllKeys(e) {
        const forbiddenKeys = ['Escape', 'F5', 'F11', 'F12', 'Alt', 'Control', 'Meta', 'ArrowLeft', 'ArrowRight', 'Backspace'];
        if(forbiddenKeys.includes(e.key) || e.keyCode === 116 || (e.ctrlKey && (e.key === 'r' || e.key === 'w' || e.key === 'R')) || e.altKey) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
        // Ctrl+Tab, Ctrl+T, etc.
        if(e.ctrlKey || e.altKey) {
            e.preventDefault();
            return false;
        }
    }
    
    // Disable right click
    document.addEventListener('contextmenu', (e) => e.preventDefault());
    
    // Disable all key combinations
    window.addEventListener('keydown', disableAllKeys);
    window.addEventListener('keyup', disableAllKeys);
    
    // 🔒 Disable touch gestures (swipe back/forward on mobile)
    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
    });
    document.addEventListener('touchmove', (e) => {
        const diff = e.touches[0].clientX - touchStartX;
        if(Math.abs(diff) > 50) {
            e.preventDefault();
        }
    }, {passive: false});
    
    // 🔒 Disable any button clicks from doing anything
    fakeBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if(!videoEnded) {
                // Fake vibration on mobile
                if(navigator.vibrate) navigator.vibrate(100);
                // Show annoying message
                const msg = document.createElement('div');
                msg.innerText = '⛔ VIDEO KHATAM HOGA TABHI LOCK KHULEGA ⛔';
                msg.style.position = 'fixed';
                msg.style.bottom = '70px';
                msg.style.left = '20px';
                msg.style.right = '20px';
                msg.style.background = 'red';
                msg.style.color = 'white';
                msg.style.padding = '10px';
                msg.style.borderRadius = '10px';
                msg.style.zIndex = '20000';
                msg.style.textAlign = 'center';
                msg.style.fontWeight = 'bold';
                document.body.appendChild(msg);
                setTimeout(() => msg.remove(), 1500);
            }
            return false;
        });
    });
    
    // 🔒 Disable video controls / right click on video
    video.addEventListener('contextmenu', (e) => e.preventDefault());
    video.controls = false;
    
    // 📌 When video ends, unlock everything
    video.addEventListener('ended', function() {
        videoEnded = true;
        
        // Show hidden message
        const msgDiv = document.getElementById('hiddenMsg');
        msgDiv.style.display = 'block';
        
        // Remove all key locks
        window.removeEventListener('keydown', disableAllKeys);
        window.removeEventListener('keyup', disableAllKeys);
        
        // Enable touch again
        document.body.classList.remove('disable-touch');
        
        // Change fake buttons to real ones
        document.getElementById('fakeCloseBtn').innerHTML = '✅ EXIT NOW (REAL)';
        document.getElementById('fakePauseBtn').innerHTML = '🔄 REPEAT PRANK';
        document.getElementById('fakeMuteBtn').innerHTML = '👻 SHARE WITH FRIEND';
        
        // Add real functionality
        document.getElementById('fakeCloseBtn').onclick = () => {
            window.location.href = 'about:blank';
            // Or simply: container.style.display = 'none';
        };
        document.getElementById('fakePauseBtn').onclick = () => {
            location.reload();
        };
        document.getElementById('fakeMuteBtn').onclick = () => {
            alert('Link copy kar: ' + window.location.href);
        };
        
        // Optional: Play a laugh sound
        try {
            const laugh = new Audio('https://www.myinstants.com/media/sounds/troll-lol.mp3');
            laugh.play();
        } catch(e) {}
    });
    
    // Agar video load na ho toh fallback
    video.addEventListener('error', function() {
        alert('❌ Video link sahi nahi hai! .mp4 direct link daalo.\n\nPinterest se link kaise nikale? Use "SaveFrom.net Helper" extension ya "Inspect Element" > Network > Media');
    });
    
    // Force fullscreen on mobile (optional, user ko thoda aur phasane ke liye)
    function forceFullscreen() {
        const docEl = document.documentElement;
        if(docEl.requestFullscreen) {
            docEl.requestFullscreen().catch(err => console.log("Fullscreen error"));
        } else if(docEl.webkitRequestFullscreen) {
            docEl.webkitRequestFullscreen();
        }
        // Try every 2 seconds until video ends
        if(!videoEnded) {
            setTimeout(forceFullscreen, 2000);
        }
    }
    // Start fullscreen attempt after user interaction (browsers require user gesture)
    document.body.addEventListener('click', function initFull() {
        forceFullscreen();
        document.body.removeEventListener('click', initFull);
    });
    
    // Lock history back
    history.pushState(null, null, location.href);
    window.addEventListener('popstate', function () {
        history.pushState(null, null, location.href);
    });
    
    console.log("%c🔥 PRANK ACTIVE - VIDEO END HONE DO 🔥", "color: red; font-size: 20px");
</script>
</body>
</html>
