<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🔥 SYSTEM LOCKED 🔥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: black;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* Image Container */
        .image-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .zoom-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: slowZoom 10s ease-in-out forwards;
            transform-origin: center center;
        }

        /* Slow zoom effect */
        @keyframes slowZoom {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.6);
            }
        }

        /* Fake UI Overlay (Buttons do NOTHING for 10 sec) */
        .fake-ui {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10000;
            pointer-events: none;
        }

        .fake-ui button {
            background: rgba(255,0,0,0.7);
            color: white;
            border: 2px solid rgba(255,255,255,0.5);
            padding: 12px 24px;
            margin: 0 8px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            pointer-events: auto;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .fake-ui button:active {
            transform: scale(0.97);
        }

        /* Toast Message */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: red;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            z-index: 10001;
            white-space: nowrap;
            border: 1px solid red;
            display: none;
            font-family: monospace;
        }

        /* End Message (After 10 sec) */
        .end-message {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 20000;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        .end-message h1 {
            color: #ff3333;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .end-message p {
            color: #ccc;
            font-size: 1.2rem;
            margin: 10px;
        }

        .end-message button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 15px 35px;
            margin-top: 30px;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        .end-message button:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>

<div class="image-container" id="imageContainer">
    <!-- 🔥 TERI IMAGE (ImgBB wali) -->
    <img class="zoom-image" id="scaryImage" src="https://i.ibb.co/ZpZf8qdr/fa7b459655d73815cddafad86a4c91b5.jpg" alt="Scary Image">
</div>

<div class="fake-ui">
    <button id="fakeClose">❌ CLOSE (FAKE)</button>
    <button id="fakePause">⏸️ PAUSE (FAKE)</button>
    <button id="fakeExit">🚪 EXIT (FAKE)</button>
</div>

<div id="toastMsg" class="toast">⛔ 10 सेकंड रुको! ⛔</div>

<div id="endMessage" class="end-message">
    <h1>😂 DAR GAYA? 😂</h1>
    <p>10 सेकंड खत्म! अब तू आज़ाद है 🎉</p>
    <button id="realCloseBtn">😎 DUBAARA KHELO 😎</button>
</div>

<script>
    // ---------- PRANK ENGINE ----------
    let locked = true;
    const fakeBtns = document.querySelectorAll('.fake-ui button');
    const toast = document.getElementById('toastMsg');

    // 1. 🔇 CHIINKHNE WALI VOICE CLIP (10 sec)
    const screamAudio = new Audio('https://www.myinstants.com/media/sounds/woman-screaming-sound-effect.mp3');
    screamAudio.volume = 0.9;
    screamAudio.loop = false;

    // Play scream immediately
    screamAudio.play().catch(e => console.log("Audio error:", e));

    // 2. 🔒 BLOCK ALL KEYS (Escape, F5, Ctrl+R, Back, etc.)
    function blockAllKeys(e) {
        const blocked = ['Escape', 'F5', 'F11', 'F12', 'Backspace', 'Alt', 'Control', 'Meta', 
                         'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'Tab'];
        if (blocked.includes(e.key) || e.keyCode === 116 || e.keyCode === 8 || e.keyCode === 27) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
        if (e.ctrlKey || e.altKey || e.metaKey) {
            e.preventDefault();
            return false;
        }
        if (e.keyCode >= 112 && e.keyCode <= 123) {
            e.preventDefault();
            return false;
        }
    }
    window.addEventListener('keydown', blockAllKeys);
    window.addEventListener('keyup', blockAllKeys);

    // 3. BLOCK RIGHT CLICK
    document.addEventListener('contextmenu', (e) => e.preventDefault());

    // 4. BLOCK TOUCH SWIPE (mobile)
    let touchStart = 0;
    document.addEventListener('touchstart', (e) => {
        touchStart = e.touches[0].clientX;
        if (locked) e.preventDefault();
    }, {passive: false});
    document.addEventListener('touchmove', (e) => {
        if (locked) {
            const diff = e.touches[0].clientX - touchStart;
            if (Math.abs(diff) > 30) e.preventDefault();
        }
    }, {passive: false});

    // 5. BLOCK HISTORY BACK
    history.pushState(null, null, location.href);
    window.addEventListener('popstate', function () {
        history.pushState(null, null, location.href);
    });

    // 6. FAKE BUTTONS - SIRF TOAST DIKHAYENGE
    fakeBtns.forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            if (locked) {
                if (navigator.vibrate) navigator.vibrate(100);
                toast.style.display = 'block';
                setTimeout(() => toast.style.display = 'none', 1200);
                // Thoda red flash
                document.body.style.backgroundColor = 'red';
                setTimeout(() => document.body.style.backgroundColor = 'black', 100);
            }
            return false;
        });
    });

    // 7. ⏱️ EXACTLY 10 SECOND LOCK
    setTimeout(() => {
        if (locked) {
            locked = false;
            
            // Stop scream audio
            screamAudio.pause();
            screamAudio.currentTime = 0;
            
            // Remove key locks
            window.removeEventListener('keydown', blockAllKeys);
            window.removeEventListener('keyup', blockAllKeys);
            
            // Hide fake buttons
            document.querySelector('.fake-ui').style.display = 'none';
            
            // Show end message
            document.getElementById('endMessage').style.display = 'flex';
            
            // Real close button
            document.getElementById('realCloseBtn').onclick = () => {
                window.location.reload();
            };
            
            // Slowly hide image container
            const imgCont = document.getElementById('imageContainer');
            imgCont.style.transition = 'opacity 0.5s';
            imgCont.style.opacity = '0';
            setTimeout(() => imgCont.style.display = 'none', 500);
        }
    }, 10000); // 10 second exact

    // 8. FULLSCREEN ON FIRST CLICK
    function forceFullscreen() {
        const docEl = document.documentElement;
        if (docEl.requestFullscreen) docEl.requestFullscreen().catch(() => {});
        else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
    }
    document.body.addEventListener('click', function oneClick() {
        forceFullscreen();
        document.body.removeEventListener('click', oneClick);
    });

    // Disable pinch zoom
    document.addEventListener('gesturestart', (e) => e.preventDefault());

    console.log("%c🔥 PRANK ACTIVE - IMAGE ZOOM + SCREAM FOR 10 SEC 🔥", "color: red; font-size: 18px");
    console.log("%c⛔ Koi button kaam nahi karega ⛔", "color: orange; font-size: 14px");
</script>
</body>
</html>
